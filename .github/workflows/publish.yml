name: Generate a build and push to another branch

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Push
    steps:
      - name: git-checkout
        uses: actions/checkout@v4

      - name: Install all dependencies
        run: npm install

      - name: Build
        run: npm run build # The build command of your project
        env:
          # Updated to VITE_ prefix so Vite can read them during the build
          VITE_SERVICE_ID: ${{ secrets.REACT_APP_SERVICE_ID }}
          VITE_TEMPLATE_ID: ${{ secrets.REACT_APP_TEMPLATE_ID }}
          VITE_PUBLIC_KEY: ${{ secrets.REACT_APP_PUBLIC_KEY }}

      - name: Push
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: build # The branch name where you want to push the assets
          FOLDER: dist # Updated to 'dist' because Vite outputs here by default
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
          MESSAGE: "Build: ({sha}) {msg}"